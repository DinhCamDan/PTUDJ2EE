<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout.html}">

<head>
  <title>Danh Sách Sản Phẩm</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet">

  <style>

    .product-card{
        transition:0.3s;
        border-radius:12px;
    }

    .product-card:hover{
        transform:scale(1.05);
        box-shadow:0 10px 20px rgba(0,0,0,0.15);
    }

    .product-image{
        height:200px;
        object-fit:cover;
        border-top-left-radius:12px;
        border-top-right-radius:12px;
    }

    .product-price{
        color:#d00000;
        font-weight:bold;
        font-size:18px;
    }

  </style>

</head>

<body>

<div layout:fragment="content" class="container mt-4">

  <h2 class="mb-4">Danh Sách Sản Phẩm</h2>

  <div class="mb-3">
    <a th:href="@{/products/create}" class="btn btn-success">
      Thêm Sản Phẩm Mới
    </a>
  </div>

  <div class="row">

    <div class="col-md-3 mb-4"
         th:each="product : ${listproduct}">

      <div class="card product-card h-100 shadow-sm">

        <!-- Hình ảnh -->
        <img th:if="${product.image != null}"
             th:src="${product.image.startsWith('http') ? product.image : '/images/' + product.image}"
             class="card-img-top product-image">

        <div class="card-body">

          <!-- Tên sản phẩm -->
          <h5 class="card-title"
              th:text="${product.name}">
          </h5>

          <!-- Giá -->
          <p class="product-price"
             th:text="${#numbers.formatInteger(product.price * 1000, 0, 'POINT')} + ' VNĐ'">
          </p>

          <!-- Danh mục -->
          <p class="text-muted"
             th:text="${product.category != null ? product.category.name : ''}">
          </p>

        </div>

        <div class="card-footer text-center bg-white">

          <a th:href="@{/products/edit/{id}(id=${product.id})}"
             class="btn btn-warning btn-sm">
            Sửa
          </a>

          <form th:action="@{/products/delete/{id}(id=${product.id})}"
                method="post"
                style="display:inline;">

            <button type="submit"
                    class="btn btn-danger btn-sm"
                    onclick="return confirm('Bạn có chắc muốn xóa?')">
              Xóa
            </button>

          </form>

        </div>

      </div>

    </div>

  </div>

</div>

</body>
</html>
