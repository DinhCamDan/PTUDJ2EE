<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout.html}">

<head>
  <title>Danh Sách Sản Phẩm</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>

<body>
<div layout:fragment="content" class="container mt-4">

  <h2 class="mb-4">Danh Sách Sản Phẩm</h2>

  <div class="mb-3">
    <a th:href="@{/products/create}" class="btn btn-primary">
      Thêm Sản Phẩm Mới
    </a>
  </div>

  <!-- Bảng danh sách sản phẩm -->
  <table class="table table-bordered table-striped">
    <thead class="table-light">
    <tr>
      <th>ID</th>
      <th>Tên sản phẩm</th>
      <th>Giá</th>
      <th>Hình ảnh</th>
      <th>Danh mục</th>
      <th>Hành động</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="product : ${listproduct}">
      <td th:text="${product.id}"></td>

      <td th:text="${product.name}"></td>

      <!-- Hiển thị giá dạng 50.000 VNĐ -->
      <td th:text="${#numbers.formatInteger(product.price, 0, 'POINT')} + ' VNĐ'"></td>

      <!-- Hiển thị ảnh -->
      <td>
        <img th:if="${product.image != null}"
             th:src="${product.image.startsWith('http')}
              ? ${product.image}
              : '/images/' + ${product.image}"
             style="width:120px;height:100px;object-fit:cover;">
      </td>

      <!-- Danh mục -->
      <td th:text="${product.category != null ? product.category.name : ''}"></td>

      <!-- Nút hành động -->
      <td>
        <a th:href="@{/products/edit/{id}(id=${product.id})}"
           class="btn btn-warning btn-sm">
          Sửa
        </a>

        <form th:action="@{/products/delete/{id}(id=${product.id})}"
              method="post"
              style="display:inline;">
          <button type="submit"
                  class="btn btn-danger btn-sm"
                  onclick="return confirm('Bạn có chắc muốn xóa?')">
            Xóa
          </button>
        </form>
      </td>
    </tr>
    </tbody>
  </table>

</div>
</body>
</html>
