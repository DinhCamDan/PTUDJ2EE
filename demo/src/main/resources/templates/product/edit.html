<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
  <meta charset="UTF-8">
  <title>Edit Product</title>
</head>
<body>
<div layout:fragment="content" class="container body-content mt-4">
  <h2 class="mb-4">Chỉnh sửa sản phẩm</h2>
  <form th:action="@{/products/edit}" th:object="${product}"
        method="post" enctype="multipart/form-data">

    <input type="hidden" th:field="*{id}"/>

    <input type="text" th:field="*{name}" class="form-control mb-2">

    <input type="number" th:field="*{price}" class="form-control mb-2">

    <label>Ảnh hiện tại:</label><br>
    <img th:src="${product.image != null && product.image.startsWith('http')}
                 ? ${product.image}
                 : @{/images/} + ${product.image}"
         width="120" height="100" class="mb-3">

    <label>Upload ảnh mới:</label>
    <input type="file" name="imageProduct" class="form-control mb-2"
           accept="image/png,image/jpeg">

    <label>Hoặc nhập link ảnh mới:</label>
    <input type="text" name="imageUrl" class="form-control mb-3"
           placeholder="https://example.com/image.jpg">

    <select th:field="*{category.id}" class="form-control mb-3">
      <option th:each="c : ${categories}"
              th:value="${c.id}"
              th:text="${c.name}">
      </option>
    </select>

    <button type="submit" class="btn btn-success">Update</button>
  </form>
</div>
</body>
</html>
